name: Build WinMobile APK

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v1

    - name: Build debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Build release APK (unsigned)
      run: ./gradlew assembleRelease --stacktrace

    - name: Run unit tests
      run: ./gradlew test --stacktrace

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: WinMobile-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload release APK
      uses: actions/upload-artifact@v4
      with:
        name: WinMobile-release-unsigned
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: app/build/reports/tests/
        retention-days: 7

  sign-and-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Build release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: Download release APK
      uses: actions/download-artifact@v4
      with:
        name: WinMobile-release-unsigned
        path: ./app/build/outputs/apk/release/

    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0"

    - name: Rename signed APK
      run: |
        mv ${{ steps.sign_app.outputs.signedReleaseFile }} WinMobile-signed.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: WinMobile-signed.apk
        draft: false
        prerelease: false
        body: |
          # WinMobile Release ${{ github.ref_name }}
          
          ## What's New
          See CHANGELOG.md for details.
          
          ## Installation
          1. Download `WinMobile-signed.apk`
          2. Enable "Unknown Sources" in Android Settings
          3. Install the APK
          4. Grant permissions
          5. Create your first container!
          
          ## Requirements
          - Android 8.0 or higher
          - ARM64 architecture
          - 4GB RAM minimum
          - 10GB free storage
          
          ## Support
          - GitHub Issues: Report bugs
          - Documentation: See README.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Run lint
      run: ./gradlew lint --stacktrace

    - name: Upload lint results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-results
        path: app/build/reports/lint-results*.html
        retention-days: 7

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
